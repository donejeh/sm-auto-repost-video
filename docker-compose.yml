services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data
    depends_on:
      - redis

  worker:
    build: .
    command: arq backend.workers.arq_worker.WorkerSettings
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  redis_data:
